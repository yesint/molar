name: Publish pymolar to PyPI

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

# Builds and publishes only `pymolar` (float32) from `molar_python/`. The
# `precision` matrix dimension is kept (single f32 value) so the f64
# project (`molar_python/pymolar-f64-pkg/`) can be re-added later if we ever
# decide to ship the float64 wheels to PyPI. Wheels are emitted to
# `${{ github.workspace }}/dist`.

jobs:
  linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-latest
            target: x86_64
            precision: f32
            working-directory: molar_python
          - runs-on: ubuntu-24.04-arm
            target: aarch64
            precision: f32
            working-directory: molar_python
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          working-directory: ${{ matrix.working-directory }}
          args: --release --out ${{ github.workspace }}/dist --find-interpreter
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}-${{ matrix.precision }}
          path: dist

  macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
            precision: f32
            working-directory: molar_python
          - target: aarch64
            precision: f32
            working-directory: molar_python
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          working-directory: ${{ matrix.working-directory }}
          args: --release --out ${{ github.workspace }}/dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}-${{ matrix.precision }}
          path: dist

  windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - precision: f32
            working-directory: molar_python
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: ${{ matrix.working-directory }}
          args: --release --out ${{ github.workspace }}/dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64-${{ matrix.precision }}
          path: dist

  sdist:
    strategy:
      fail-fast: false
      matrix:
        include:
          - precision: f32
            working-directory: molar_python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          working-directory: ${{ matrix.working-directory }}
          args: --out ${{ github.workspace }}/dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist-${{ matrix.precision }}
          path: dist

  publish:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    needs: [linux, macos, windows, sdist]
    runs-on: ubuntu-latest
    # Publishes `pymolar` to PyPI via Trusted Publishing (configured for the
    # `pymolar` project + this repo/workflow/`pypi` environment).
    environment:
      name: pypi
      url: https://pypi.org/p/pymolar
    permissions:
      id-token: write   # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Idempotent re-runs: skip wheels already on PyPI instead of failing
          # with "File already exists".
          skip-existing: true
